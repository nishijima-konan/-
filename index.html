
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>QRラベル判定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 10px; }
        h1 { font-size: 22px; font-weight: bold; }
        button { margin: 5px 0; padding: 10px 14px; font-size: 18px; width: 100%; }
        #status { font-size: 18px; margin: 10px 0; color: #444; }
        #result { margin-top: 10px; font-size: 26px; font-weight: bold; text-align: center; }
        .ok { color: green; }
        .ng { color: red; }
        #video-wrapper {width: 100%; max-width: 400px; margin: 10px auto; position: relative; }
        #video {width: 100%; display: block; border-radius: 6px; transform: scaleX(1); }
        #overlay {position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
        .label { font-size: 14px; color: #555; margin-bottom: 5px; }
        #log { font-size: 14px; margin-top: 10px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .cam-ctrl { background: #f0f0f0; border: 1px solid #bbb; color: #333; font-size: 14px; padding: 6px; margin: 5px 0; }
    </style>
    <!-- 一瞬で読めた時の高性能ライブラリ(ZXing)に戻しました -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

    <h1>QRラベル判定</h1>
    <div id="status">停止中</div>

    <!-- カメラ切り替えレスキュー機能 -->
    <div class="box" style="background:#fff9e6; border-color:#ffe0b2;">
        <div class="label" style="color:#b78103; font-weight:bold;">⚠️ 内カメラが動く・停止する場合の切り替え</div>
        <div id="cam-info" style="font-size:12px; margin-bottom:5px; color:#666;">カメラを準備中...</div>
        <button class="cam-ctrl" onclick="switchCamera()">次のカメラに切り替え</button>
    </div>

    <div class="box">
        <div class="label">① 標準QR登録</div>
        <button onclick="startScan('qr1ref')">QR1標準を読み取る</button>
        <div id="qr1refText"></div>
        <button onclick="startScan('qr2ref')">QR2標準を読み取る</button>
        <div id="qr2refText"></div>
    </div>

    <div class="box">
        <div class="label">② ラベル照合（自動ループ）</div>
        <button onclick="startAuto()">照合開始（QR1→QR2→QR1…）</button>
        <button onclick="stopScan()">停止</button>
        <div id="result"></div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="box">
        <div class="label">③ 読み取り履歴ログ</div>
        <div id="log"></div>
    </div>

<script>
    let refQR1 = null;
    let refQR2 = null;
    let currentMode = null;
    let autoMode = false;
    let codeReader = null;
    let scanReady = false;

    // カメラリスト管理
    let videoDevices = [];
    let currentCamIndex = 0;

    try {
        codeReader = new ZXing.BrowserQRCodeReader();
    } catch (e) {
        console.error("ZXing error", e);
    }

    // 利用可能なカメラ一覧を取得して背面を優先ソート
    async function initCameraList() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(device => device.kind === 'videoinput');
            
            if (videoInputs.length > 0) {
                // 背面カメラ(front/user/内カメラを含まないもの)を前に、内カメラを後ろに並び替える
                const back = videoInputs.filter(d => !d.label.toLowerCase().includes('front') && !d.label.toLowerCase().includes('user') && !d.label.includes('内'));
                const front = videoInputs.filter(d => d.label.toLowerCase().includes('front') || d.label.toLowerCase().includes('user') || d.label.includes('内'));
                videoDevices = [...back, ...front];
                
                updateCamInfoDisplay();
            } else {
                document.getElementById('cam-info').textContent = "カメラが見つかりません";
            }
        } catch (e) {
            console.error("Enumerate devices error", e);
            document.getElementById('cam-info').textContent = "カメラ一覧を取得できませんでした";
        }
    }

    function updateCamInfoDisplay() {
        if(videoDevices.length > 0) {
            const label = videoDevices[currentCamIndex].label || `カメラ ${currentCamIndex + 1}`;
            document.getElementById('cam-info').textContent = `全カメラ数: ${videoDevices.length}つ（現在: ${currentCamIndex + 1}つ目を選択中）\n[${label}]`;
        }
    }

    // カメラ切り替えボタン
    async function switchCamera() {
        if (videoDevices.length <= 1) {
            alert("切り替え可能な他のカメラが見つかりません。");
            return;
        }
        currentCamIndex = (currentCamIndex + 1) % videoDevices.length;
        updateCamInfoDisplay();
        
        if (currentMode) {
            const saveMode = currentMode;
            stopScan();
            // 少し待ってから次のカメラでスキャンを再起動
            setTimeout(() => { startScan(saveMode); }, 400);
        } else {
            alert("「読み取る」または「照合開始」を押してから切り替えてください。");
        }
    }

    function parseQR1(text) {
        if (!text) return { partNo: "", qty: "" };
        const parts = text.split(",", 5);
        if (parts.length < 5) return { partNo: text.trim(), qty: "1" };
        return { partNo: parts[0].trim(), qty: parts[4].trim() };
    }

    function parseQR2(text) {
        if (!text) return { partNo: "", qty: "" };
        const parts = text.trim().split(/\s+/);
        if (parts.length < 12) return { partNo: text.trim(), qty: "1" };
        return {
            partNo: parts[1] + " " + parts[2],
            qty: parts[11].replace(/^0+/, "")
        };
    }

    function checkQR1(ref, qr1) { return ref && qr1 && ref.partNo === qr1.partNo && ref.qty === qr1.qty; }
    function checkQR2(ref, qr2) { return ref && qr2 && ref.partNo === qr2.partNo && ref.qty === qr2.qty; }

    function vibOK() { if(navigator.vibrate) navigator.vibrate(100); }
    function vibNG() { if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
    function vibStart() { if(navigator.vibrate) navigator.vibrate(50); }

    async function startScan(mode) {
        currentMode = mode;
        scanReady = false;
        document.getElementById('status').textContent = mode + " 読み取り中…";
        vibStart();
        
        if (codeReader) codeReader.reset();
        const overlay = document.getElementById("overlay");
        const octx = overlay.getContext("2d");
        octx.clearRect(0, 0, overlay.width, overlay.height);

        try {
            if(videoDevices.length === 0) {
                await initCameraList();
            }

            // 切り替え機能で選ばれている特定のカメラID、またはデフォルト背面を指定
            const constraints = {
                video: videoDevices.length > 0 
                    ? { deviceId: { exact: videoDevices[currentCamIndex].id } }
                    : { facingMode: "environment" }
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const videoElement = document.getElementById('video');
            videoElement.srcObject = stream;

            setTimeout(() => {
                scanReady = true;
            }, 1000);

            codeReader.decodeFromStream(stream, 'video', (result, err) => {
                if (result && scanReady) {
                    if (result.resultPoints) drawBox(result.resultPoints);
                    handleScan(result.text);
                }
            });

        } catch (err) {
            console.error("Camera error: ", err);
            document.getElementById('status').textContent = "Camera Error (停止)";
        }
    }

    function drawBox(points) {
        const overlay = document.getElementById("overlay");
        const video = document.getElementById("video");
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        const ctx = overlay.getContext("2d");
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 4;
        ctx.beginPath();
        const scaleX = video.clientWidth / video.videoWidth;
        const scaleY = video.clientHeight / video.videoHeight;
        ctx.moveTo(points[0].getX() * scaleX, points[0].getY() * scaleY);
        for(let i=1; i<points.length; i++) {
            ctx.lineTo(points[i].getX() * scaleX, points[i].getY() * scaleY);
        }
        ctx.closePath();
        ctx.stroke();
    }

    function startAuto() {
        if (!refQR1 || !refQR2) {
            alert("標準QRが登録されていません");
            return;
        }
        autoMode = true;
        startScan("qr1");
    }

    function stopScan() {
        autoMode = false;
        currentMode = null;
        scanReady = false;
        const videoElement = document.getElementById('video');
        if (videoElement && videoElement.srcObject) {
            const stream = videoElement.srcObject;
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
            videoElement.srcObject = null;
        }
        if(codeReader) codeReader.reset();
        document.getElementById('status').textContent = "停止しました";
        const overlay = document.getElementById("overlay");
        overlay.getContext("2d").clearRect(0, 0, overlay.width, overlay.height);
    }

    function handleScan(text) {
        if (!text) return;
        stopScan();

        if (currentMode === "qr1ref") {
            refQR1 = parseQR1(text);
            document.getElementById("qr1refText").textContent = "QR1標準登録完了";
            vibOK();
            addLog("QR1標準", "OK", text);
            return;
        }
        if (currentMode === "qr2ref") {
            refQR2 = parseQR2(text);
            document.getElementById("qr2refText").textContent = "QR2標準登録完了";
            vibOK();
            addLog("QR2標準", "OK", text);
            return;
        }

        if (autoMode) {
            if (currentMode === "qr1") {
                const qr1 = parseQR1(text);
                const ok = checkQR1(refQR1, qr1);
                showResult(ok, "QR1");
                addLog("QR1", ok ? "OK" : "NG", text);
                if (ok) {
                    vibOK();
                    currentMode = "qr2";
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 1200);
                } else {
                    vibNG();
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 2000);
                }
                return;
            }
            if (currentMode === "qr2") {
                const qr2 = parseQR2(text);
                const ok = checkQR2(refQR2, qr2);
                showResult(ok, "QR2");
                addLog("QR2", ok ? "OK" : "NG", text);
                if (ok) {
                    vibOK();
                    currentMode = "qr1";
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 1200);
                } else {
                    vibNG();
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 2000);
                }
                return;
            }
        }
    }

    function showResult(ok, label) {
        const r = document.getElementById("result");
        if (ok) { r.textContent = label + " OK"; r.className = "ok"; }
        else { r.textContent = label + " NG"; r.className = "ng"; }
    }

    function addLog(type, result, text) {
        const log = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const cleanText = text.replace(/[\x00-\x1F\x7F-\x9F]/g, " ");
        log.textContent = `[${time}] ${type} → ${result} : ${cleanText}\n` + log.textContent;
    }

    // 読み込み時にカメラをリスト化
    window.addEventListener('DOMContentLoaded', initCameraList);
</script>
</body>
</html>
