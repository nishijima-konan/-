<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QRラベル判定</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { font-family: sans-serif; padding: 10px; }
  h1 { font-size: 22px; font-weight: bold; }
  button { margin: 5px 0; padding: 10px 14px; font-size: 18px; width: 100%; }
  #status { font-size: 18px; margin: 10px 0; color: #444; }
  #result { margin-top: 10px; font-size: 26px; font-weight: bold; text-align: center; }
  .ok { color: green; }
  .ng { color: red; }

  #video-wrapper {
    width: 100%;
    max-width: 400px;
    margin: 10px auto;
    position: relative;
  }

  #video {
    width: 100%;
    display: block;
    border-radius: 6px;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
  .label { font-size: 14px; color: #555; margin-bottom: 5px; }
  #log { font-size: 14px; margin-top: 10px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
</style>

<!-- jsQRライブラリの読み込み -->
<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

</head>
<body>

<h1>QRラベル判定</h1>

<div id="status"></div>

<div class="box">
  <div class="label">① 標準QR登録</div>
  <button onclick="startScan('qr1ref')">QR1標準を読み取る</button>
  <div id="qr1refText"></div>

  <button onclick="startScan('qr2ref')">QR2標準を読み取る</button>
  <div id="qr2refText"></div>
</div>

<div class="box">
  <div class="label">② ラベル照合（自動ループ）</div>
  <button onclick="startAuto()">照合開始（QR1→QR2→QR1…）</button>
  <button onclick="stopScan()">停止</button>
  <div id="result"></div>
</div>

<div id="video-wrapper">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="box">
  <div class="label">③ 読み取り履歴ログ</div>
  <div id="log"></div>
</div>

<script>
let refQR1 = null;
let refQR2 = null;
let currentMode = null;
let autoMode = false;
let stream = null;
let scanning = false;

// --- QRデータ解析 ---
function parseQR1(text) {
  const parts = text.split(",", 5);
  return { partNo: parts[0].trim(), qty: parts[4].trim() };
}

function parseQR2(text) {
  const parts = text.trim().split(/\s+/);
  return {
    partNo: parts[1] + " " + parts[2],
    qty: parts[11].replace(/^0+/, "")
  };
}

function checkQR1(ref, qr1) { return ref.partNo === qr1.partNo && ref.qty === qr1.qty; }
function checkQR2(ref, qr2) { return ref.partNo === qr2.partNo && ref.qty === qr2.qty; }

// --- バイブレーション ---
function vibOK() { navigator.vibrate(100); }
function vibNG() { navigator.vibrate([200, 100, 200]); }
function vibStart() { navigator.vibrate(50); }

// --- カメラ起動（パナソニック同等の最速設定） ---
async function startScan(mode) {
  currentMode = mode;
  document.getElementById('status').textContent = mode + " 読み取り中…";
  vibStart();

  const video = document.getElementById("video");

  if (!stream) {
    try {
      // 余計な制約をなくし、スマホの背面カメラの標準性能（HD解像度）をストレートに引き出す
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      video.srcObject = stream;

      // オートフォーカスを「継続モード」にする命令（端末が対応していれば有効化）
      setTimeout(async () => {
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities();
        if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
          await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        }
      }, 500);

    } catch (err) {
      console.error(err);
      document.getElementById('status').textContent = "カメラ起動エラー";
      return;
    }
  }

  scanning = true;
  scanLoop();
}

// --- 高速スキャンループ（無駄な計算を一切しない） ---
function scanLoop() {
  if (!scanning) return;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const overlay = document.getElementById("overlay");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const octx = overlay.getContext("2d");

  if (video.videoWidth === 0 || video.videoHeight === 0) {
    requestAnimationFrame(scanLoop);
    return;
  }

  if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
  }

  // カメラ映像をそのまま描画してjsQRに渡す
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  
  // jsQRの最高パフォーマンスで解析
  const code = jsQR(imgData.data, canvas.width, canvas.height);

  octx.clearRect(0, 0, overlay.width, overlay.height);

  if (code) {
    drawBox(octx, code.location);
    handleScan(code.data);
  }

  requestAnimationFrame(scanLoop);
}

// --- 枠線描画 ---
function drawBox(ctx, loc) {
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(loc.topLeftCorner.x, loc.topLeftCorner.y);
  ctx.lineTo(loc.topRightCorner.x, loc.topRightCorner.y);
  ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
  ctx.lineTo(loc.bottomLeftCorner.x, loc.bottomLeftCorner.y);
  ctx.closePath();
  ctx.stroke();
}

// --- 自動ループ開始 ---
function startAuto() {
  if (!refQR1 || !refQR2) {
    alert("標準QRが登録されていません");
    return;
  }
  autoMode = true;
  currentMode = "qr1";
  document.getElementById('status').textContent = "自動照合モード開始";
  vibStart();
  startScan(currentMode);
}

// --- 停止 ---
function stopScan() {
  autoMode = false;
  scanning = false;
  currentMode = null;
  document.getElementById('status').textContent = "停止しました";
}

// --- 読み取り後の処理 ---
function handleScan(text) {
  if (!text) return;
  scanning = false; // 連続読み込みを防ぐために一度止める

  if (currentMode === "qr1ref") {
    refQR1 = parseQR1(text);
    document.getElementById("qr1refText").textContent = "QR1標準: " + text;
    vibOK();
    addLog("QR1標準", "OK", text);
    stopScan();
    return;
  }

  if (currentMode === "qr2ref") {
    refQR2 = parseQR2(text);
    document.getElementById("qr2refText").textContent = "QR2標準: " + text;
    vibOK();
    addLog("QR2標準", "OK", text);
    stopScan();
    return;
  }

  if (autoMode) {
    if (currentMode === "qr1") {
      const qr1 = parseQR1(text);
      const ok = checkQR1(refQR1, qr1);
      showResult(ok, "QR1");
      addLog("QR1", ok ? "OK" : "NG", text);
      if (ok) {
        vibOK();
        currentMode = "qr2";
        setTimeout(() => { if(autoMode) { scanning = true; scanLoop(); } }, 1200);
      } else {
        vibNG();
        stopScan();
      }
      return;
    }

    if (currentMode === "qr2") {
      const qr2 = parseQR2(text);
      const ok = checkQR2(refQR2, qr2);
      showResult(ok, "QR2");
      addLog("QR2", ok ? "OK" : "NG", text);
      if (ok) {
        vibOK();
        currentMode = "qr1";
        setTimeout(() => { if(autoMode) { scanning = true; scanLoop(); } }, 1200);
      } else {
        vibNG();
        stopScan();
      }
      return;
    }
  }
}

// --- 結果表示 ---
function showResult(ok, label) {
  const r = document.getElementById("result");
  if (ok) {
    r.textContent = label + " OK";
    r.className = "ok";
  } else {
    r.textContent = label + " NG";
    r.className = "ng";
  }
}

// --- ログ記録 ---
function addLog(type, result, text) {
  const log = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  log.textContent = `[${time}] ${type} → ${result} : ${text}\n` + log.textContent;
}
</script>

</body>
</html>
