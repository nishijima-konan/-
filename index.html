<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>QRラベル判定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 10px; }
        h1 { font-size: 22px; font-weight: bold; }
        button { margin: 5px 0; padding: 10px 14px; font-size: 18px; width: 100%; }
        #status { font-size: 18px; margin: 10px 0; color: #444; }
        #result { margin-top: 10px; font-size: 26px; font-weight: bold; text-align: center; }
        .ok { color: green; }
        .ng { color: red; }
        #video-wrapper {width: 100%; max-width: 400px; margin: 10px auto; }
        #video {width: 100%; display: block; border-radius: 6px; }
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
        .label { font-size: 14px; color: #555; margin-bottom: 5px; }
        #log { font-size: 14px; margin-top: 10px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; background: #f9f9f9; padding: 5px; }
    </style>
    <!-- jsQRライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

    <h1>QRラベル判定 (検証版)</h1>
    <div id="status">停止中</div>

    <div class="box">
        <div class="label">① 標準QR登録</div>
        <button onclick="startScan('qr1ref')">QR1標準を読み取る</button>
        <div id="qr1refText"></div>
        <button onclick="startScan('qr2ref')">QR2標準を読み取る</button>
        <div id="qr2refText"></div>
    </div>

    <div class="box">
        <div class="label">② ラベル照合（自動ループ）</div>
        <button onclick="startAuto()">照合開始（QR1→QR2→QR1…）</button>
        <button onclick="stopScan()">停止</button>
        <div id="result"></div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="box">
        <div class="label">③ 読み取り履歴ログ</div>
        <div id="log"></div>
    </div>

<script>
    let refQR1 = null;
    let refQR2 = null;
    let currentMode = null;
    let autoMode = false;
    let scanReady = false;
    let localStream = null;
    let animationFrameId = null;
    let isProcessing = false; 

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function parseQR1(text) {
        if (!text) return { partNo: "", qty: "" };
        // 安全第一：カンマ分割でエラーが出ても絶対にフリーズさせない
        try {
            const parts = text.split(",");
            if (parts.length >= 5) {
                return { partNo: parts[0].trim(), qty: parts[4].trim() };
            }
        } catch(e) { console.error(e); }
        return { partNo: text.trim(), qty: "1" };
    }

    function parseQR2(text) {
        if (!text) return { partNo: "", qty: "" };
        try {
            const parts = text.trim().split(/\s+/);
            if (parts.length >= 12) {
                return {
                    partNo: parts[1] + " " + parts[2],
                    qty: parts[11].replace(/^0+/, "")
                };
            }
        } catch(e) { console.error(e); }
        return { partNo: text.trim(), qty: "1" };
    }

    function checkQR1(ref, qr1) { return ref && qr1 && ref.partNo === qr1.partNo && ref.qty === qr1.qty; }
    function checkQR2(ref, qr2) { return ref && qr2 && ref.partNo === qr2.partNo && ref.qty === qr2.qty; }

    function vibOK() { if(navigator.vibrate) navigator.vibrate(100); }
    function vibNG() { if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
    function vibStart() { if(navigator.vibrate) navigator.vibrate(50); }

    async function startScan(mode) {
        currentMode = mode;
        scanReady = false;
        isProcessing = false; 
        document.getElementById('status').textContent = mode + " 読み取り中…";
        vibStart();
        
        stopStreamOnly();

        // 確実性を上げるため、解像度をあえて標準的なHDに戻し、スマホ側の負荷を下げてピントを合わせやすくします
        const constraints = {
            video: { 
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            const videoElement = document.getElementById('video');
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = localStream;

            setTimeout(() => {
                scanReady = true;
            }, 600);

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(scanLoop);

        } catch (err) {
            console.error("Camera error: ", err);
            document.getElementById('status').textContent = "エラーのため停止";
        }
    }

    function scanLoop() {
        if (!currentMode) return;
        
        const videoElement = document.getElementById('video');
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA && scanReady && !isProcessing) {
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "both",
            });

            if (code && code.data) {
                isProcessing = true; 
                
                // 【最重要デバッグ】何はともあれ、キャッチした生データを緊急アラートとログに吐き出す
                alert("QR検知しました！中身:\n" + code.data);
                
                handleScan(code.data); 
                return; 
            }
        }
        
        animationFrameId = requestAnimationFrame(scanLoop);
    }

    function startAuto() {
        if (!refQR1 || !refQR2) {
            alert("標準QRが登録されていません");
            return;
        }
        autoMode = true;
        startScan("qr1");
    }

    function stopStreamOnly() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
        const videoElement = document.getElementById('video');
        if (videoElement && videoElement.srcObject) {
            videoElement.srcObject.getTracks().forEach(track => track.stop());
            videoElement.srcObject = null;
        }
    }

    function stopScan() {
        autoMode = false;
        currentMode = null;
        scanReady = false;
        isProcessing = false;
        stopStreamOnly();
        document.getElementById('status').textContent = "停止しました";
    }

    function handleScan(text) {
        if (!text) {
            isProcessing = false;
            return;
        }

        if (currentMode === "qr1ref") {
            refQR1 = parseQR1(text);
            document.getElementById("qr1refText").textContent = "QR1標準登録完了: " + refQR1.partNo;
            document.getElementById('status').textContent = "QR1登録完了";
            vibOK();
            addLog("QR1標準", "OK", text);
            currentMode = null;
            stopStreamOnly(); 
            return;
        }
        if (currentMode === "qr2ref") {
            refQR2 = parseQR2(text);
            document.getElementById("qr2refText").textContent = "QR2標準登録完了: " + refQR2.partNo;
            document.getElementById('status').textContent = "QR2登録完了";
            vibOK();
            addLog("QR2標準", "OK", text);
            currentMode = null;
            stopStreamOnly(); 
            return;
        }

        if (autoMode) {
            if (currentMode === "qr1") {
                const qr1 = parseQR1(text);
                const ok = checkQR1(refQR1, qr1);
                showResult(ok, "QR1");
                addLog("QR1", ok ? "OK" : "NG", text);
                
                stopStreamOnly(); 

                if (ok) {
                    vibOK();
                    currentMode = "qr2";
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 1200);
                } else {
                    vibNG();
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 2000);
                }
                return;
            }
            if (currentMode === "qr2") {
                const qr2 = parseQR2(text);
                const ok = checkQR2(refQR2, qr2);
                showResult(ok, "QR2");
                addLog("QR2", ok ? "OK" : "NG", text);
                
                stopStreamOnly(); 

                if (ok) {
                    vibOK();
                    currentMode = "qr1";
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 1200);
                } else {
                    vibNG();
                    setTimeout(() => { if(autoMode) startScan(currentMode); }, 2000);
                }
                return;
            }
        }
    }

    function showResult(ok, label) {
        const r = document.getElementById("result");
        if (ok) { r.textContent = label + " OK"; r.className = "ok"; }
        else { r.textContent = label + " NG"; r.className = "ng"; }
    }

    function addLog(type, result, text) {
        const log = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const cleanText = text.replace(/[\x00-\x1F\x7F-\x9F]/g, " ");
        log.textContent = `[${time}] ${type} → ${result} : ${cleanText}\n` + log.textContent;
    }
</script>
</body>
</html>
