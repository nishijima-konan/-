<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>QR判定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 10px; }
        button { margin: 5px 0; padding: 12px; font-size: 18px; width: 100%; }
        #status { font-size: 18px; margin: 10px 0; color: blue; font-weight: bold; }
        #result { font-size: 26px; font-weight: bold; text-align: center; margin: 10px 0; }
        .ok { color: green; }
        .ng { color: red; }
        #video-wrapper { width: 100%; max-width: 400px; margin: 10px auto; }
        #video { width: 100%; display: block; border-radius: 6px; background: #000; }
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
        #log { font-size: 14px; white-space: pre-wrap; max-height: 150px; overflow-y: auto; background: #eee; padding: 5px; }
    </style>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

    <h1>QRラベル判定</h1>
    <div id="status">停止中</div>

    <div class="box">
        <button onclick="startScan('qr1ref')">① QR1標準を読み取る</button>
        <div id="qr1refText" style="color:green; font-weight:bold;"></div>
        <button onclick="startScan('qr2ref')">② QR2標準を読み取る</button>
        <div id="qr2refText" style="color:green; font-weight:bold;"></div>
    </div>

    <div class="box">
        <button onclick="startAuto()">③ 照合開始（ループ）</button>
        <button onclick="stopScan()" style="background:#ccc;">スキャン停止</button>
        <div id="result"></div>
    </div>

    <div id="video-wrapper">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="box">
        <div>読み取り履歴ログ</div>
        <div id="log"></div>
    </div>

<script>
    var refQR1 = null;
    var refQR2 = null;
    var currentMode = null;
    var autoMode = false;
    var codeReader = new ZXing.BrowserQRCodeReader();
    var activeStream = null;

    function parseQR1(t) {
        if (!t) return { partNo: "", qty: "" };
        var p = t.split(",");
        if (p.length < 5) return { partNo: t.trim(), qty: "1" };
        return { partNo: p[0].trim(), qty: p[4].trim() };
    }

    function parseQR2(t) {
        if (!t) return { partNo: "", qty: "" };
        var p = t.trim().split(/\s+/);
        if (p.length < 12) return { partNo: t.trim(), qty: "1" };
        return { partNo: p[1] + " " + p[2], qty: p[11].replace(/^0+/, "") };
    }

    async function startScan(mode) {
        currentMode = mode;
        document.getElementById('status').textContent = mode + " 読み取り中…";
        
        // 以前のスキャンを完全に初期化
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
        }
        codeReader.reset();

        try {
            // カメラ設定（最高画質をリクエスト）
            var constraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };

            activeStream = await navigator.mediaDevices.getUserMedia(constraints);
            var videoElement = document.getElementById('video');
            videoElement.srcObject = activeStream;

            // 1秒間は完全にスキャン判定を無視して、カメラが安定してから解読を開始させる
            setTimeout(function() {
                codeReader.decodeFromStream(activeStream, 'video', function(result, err) {
                    if (result && result.text) {
                        // 読み取ったら即座に次の処理へ（ここではstopScanを呼ばずhandleScan内で制御）
                        handleScan(result.text);
                    }
                });
            }, 1000);

        } catch (err) {
            document.getElementById('status').textContent = "カメラ起動エラー";
        }
    }

    function startAuto() {
        if (!refQR1 || !refQR2) {
            alert("標準QRが登録されていません");
            return;
        }
        autoMode = true;
        startScan("qr1");
    }

    function stopScan() {
        autoMode = false;
        currentMode = null;
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
            activeStream = null;
        }
        var videoElement = document.getElementById('video');
        if (videoElement) videoElement.srcObject = null;
        codeReader.reset();
        document.getElementById('status').textContent = "停止しました";
    }

    function handleScan(text) {
        if (!text) return;
        
        // 重複防止のため、一旦カメラストリームの枠だけ残して解読を止める
        codeReader.reset();

        if (currentMode === "qr1ref") {
            refQR1 = parseQR1(text);
            document.getElementById("qr1refText").textContent = "QR1登録完了: " + refQR1.partNo;
            stopScan();
            addLog("QR1標準登録", "OK", text);
            return;
        }
        if (currentMode === "qr2ref") {
            refQR2 = parseQR2(text);
            document.getElementById("qr2refText").textContent = "QR2登録完了: " + refQR2.partNo;
            stopScan();
            addLog("QR2標準登録", "OK", text);
            return;
        }

        if (autoMode) {
            var r = document.getElementById("result");
            if (currentMode === "qr1") {
                var qr1 = parseQR1(text);
                if (refQR1 && refQR1.partNo === qr1.partNo && refQR1.qty === qr1.qty) {
                    r.textContent = "QR1 OK"; r.className = "ok";
                    addLog("QR1照合", "OK", text);
                    currentMode = "qr2";
                    // 1.5秒後に次のQR2のスキャンに自動で進む
                    setTimeout(function() { if(autoMode) startScan("qr2"); }, 1500);
                } else {
                    r.textContent = "QR1 NG"; r.className = "ng";
                    addLog("QR1照合", "NG (不一致)", text);
                    setTimeout(function() { if(autoMode) startScan("qr1"); }, 2000);
                }
                return;
            }
            if (currentMode === "qr2") {
                var qr2 = parseQR2(text);
                if (refQR2 && refQR2.partNo === qr2.partNo && refQR2.qty === qr2.qty) {
                    r.textContent = "QR2 OK"; r.className = "ok";
                    addLog("QR2照合", "OK", text);
                    currentMode = "qr1";
                    // 1.5秒後にまたQR1のスキャンに自動で戻る
                    setTimeout(function() { if(autoMode) startScan("qr1"); }, 1500);
                } else {
                    r.textContent = "QR2 NG"; r.className = "ng";
                    addLog("QR2照合", "NG (不一致)", text);
                    setTimeout(function() { if(autoMode) startScan("qr2"); }, 2000);
                }
                return;
            }
        }
    }

    function addLog(type, res, txt) {
        var log = document.getElementById("log");
        var time = new Date().toLocaleTimeString();
        log.textContent = "[" + time + "] " + type + " -> " + res + " (" + txt.substring(0,20) + "...)\n" + log.textContent;
    }
</script>
</body>
</html>
